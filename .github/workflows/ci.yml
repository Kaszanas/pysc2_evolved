name: Continuous Integration (CI)

on:
    pull_request:
    push:
        branches:
            - main
            - dev
    workflow_dispatch:

# To successfully find the files that are required for testing:
env:
    TEST_WORKSPACE: ${{ github.workspace }}

# Shared event filter — only the entry-point jobs need this; downstream jobs
# inherit skip behaviour automatically from their `needs:` dependencies.
jobs:
    code_quality:
        if: >
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'push' ||
            github.event_name == 'pull_request' ||
            (github.event_name == 'issue_comment' &&
             github.event.comment.body == 'recheck ci' &&
             github.event.comment.user.login == 'Kaszanas')
        runs-on: ubuntu-latest
        steps:
            - name: Check-out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Install the latest version of uv
              uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82

            - name: Install development dependencies
              run: uv sync --only-dev

            - name: Initialize pre-commit
              run: uvx pre-commit install
            - name: Run pre-commit on all files.
              run: uvx pre-commit run --all-files

            - name: Install all dependencies
              run: uv sync --all-extras

    # ──────────────────────────────────────────────────────────────────────────
    # Windows pipeline: compile → package → verify (fully independent of Linux)
    # ──────────────────────────────────────────────────────────────────────────
    build-cc-windows:
        if: >
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'push' ||
            github.event_name == 'pull_request' ||
            (github.event_name == 'issue_comment' &&
             github.event.comment.body == 'recheck ci' &&
             github.event.comment.user.login == 'Kaszanas')
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - name: Check-out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Build C++ extensions and run tests
              uses: ./.github/actions/build-cc
              with:
                  ext: pyd
                  artifact-name: cc-windows-py${{ matrix.python-version }}
                  bazel-disk-cache: ${{ github.workflow }}-windows-py${{ matrix.python-version }}
                  python-version: ${{ matrix.python-version }}

    package-wheel-windows:
        needs: [build-cc-windows]
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - name: Check-out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Package wheel
              uses: ./.github/actions/build-wheel
              with:
                  ext: pyd
                  artifact-name: ci-wheel-windows-latest-py${{ matrix.python-version }}
                  cc-artifact-name: cc-windows-py${{ matrix.python-version }}
                  python-version: ${{ matrix.python-version }}

    verify-wheel-windows:
        needs: [package-wheel-windows]
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - name: Check-out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Verify wheel
              uses: ./.github/actions/verify-wheel
              with:
                  artifact-name: ci-wheel-windows-latest-py${{ matrix.python-version }}
                  python-version: ${{ matrix.python-version }}

    # ──────────────────────────────────────────────────────────────────────────
    # Linux pipeline: compile → package → verify (fully independent of Windows)
    # ──────────────────────────────────────────────────────────────────────────
    build-cc-linux:
        if: >
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'push' ||
            github.event_name == 'pull_request' ||
            (github.event_name == 'issue_comment' &&
             github.event.comment.body == 'recheck ci' &&
             github.event.comment.user.login == 'Kaszanas')
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - name: Check-out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Build C++ extensions and run tests
              uses: ./.github/actions/build-cc
              with:
                  ext: so
                  artifact-name: cc-linux-py${{ matrix.python-version }}
                  bazel-disk-cache: ${{ github.workflow }}-ubuntu-latest-py${{ matrix.python-version }}
                  python-version: ${{ matrix.python-version }}

    package-wheel-linux:
        needs: [build-cc-linux]
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - name: Check-out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Package wheel
              uses: ./.github/actions/build-wheel
              with:
                  ext: so
                  artifact-name: ci-wheel-ubuntu-latest-py${{ matrix.python-version }}
                  cc-artifact-name: cc-linux-py${{ matrix.python-version }}
                  python-version: ${{ matrix.python-version }}

    verify-wheel-linux:
        needs: [package-wheel-linux]
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - name: Check-out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Verify wheel
              uses: ./.github/actions/verify-wheel
              with:
                  artifact-name: ci-wheel-ubuntu-latest-py${{ matrix.python-version }}
                  python-version: ${{ matrix.python-version }}
