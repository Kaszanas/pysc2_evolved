name: Smoke test converter
description: >
    Assert that the pybind11 native extensions (converter and uint8_lookup)
    are importable and execute C++ code correctly.  Assumes the package is
    already installed in the current Python environment.

runs:
    using: composite
    steps:
        - name: Verify pybind11 extensions work
          shell: bash
          run: make smoke_test_local
