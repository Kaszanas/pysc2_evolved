name: Smoke test converter
description: >
    Set up Python, install the package from a registry, and assert that the
    pybind11 native extensions (converter and uint8_lookup) are importable
    and execute C++ code correctly.

inputs:
    python-version:
        description: Python version to install and test under
        required: true
    package-name:
        description: PyPI package name to install (e.g. pysc2_evolved or pysc2-evolved)
        required: true
    package-version:
        description: >
            Exact version to install (e.g. 1.1.0). When set the install
            command pins to this version so an older release on a fallback
            index cannot be picked up by mistake.
        required: false
        default: ""
    index-url:
        description: Primary index URL (leave empty for the default PyPI)
        required: false
        default: ""
    extra-index-url:
        description: Fallback index URL (only used when index-url is set)
        required: false
        default: ""

runs:
    using: composite
    steps:
        - name: Set up Python ${{ inputs.python-version }}
          uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
          with:
              python-version: ${{ inputs.python-version }}

        - name: Wait for index propagation
          if: ${{ inputs.package-version != '' }}
          shell: bash
          run: sleep 10

        - name: Install package (custom index)
          if: ${{ inputs.index-url != '' }}
          shell: bash
          run: |
              PKG="${{ inputs.package-name }}"
              if [ -n "${{ inputs.package-version }}" ]; then
                PKG="${PKG}==${{ inputs.package-version }}"
              fi
              for attempt in 1 2 3; do
                pip install \
                    --index-url ${{ inputs.index-url }} \
                    --extra-index-url ${{ inputs.extra-index-url }} \
                    "${PKG}" && break
                [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 10s..." && sleep 10 || exit 1
              done

        - name: Install package (PyPI)
          if: ${{ inputs.index-url == '' }}
          shell: bash
          run: |
              PKG="${{ inputs.package-name }}"
              if [ -n "${{ inputs.package-version }}" ]; then
                PKG="${PKG}==${{ inputs.package-version }}"
              fi
              for attempt in 1 2 3; do
                pip install "${PKG}" && break
                [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 10s..." && sleep 10 || exit 1
              done

        - name: Verify pybind11 extensions work
          shell: bash
          run: python scripts/smoke_test_converter.py
