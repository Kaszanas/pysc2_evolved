name: Verify wheel
description: >
    Download a wheel artifact, install it with pip, and run a functional
    smoke test to confirm the pybind11 native extensions are present and
    execute C++ code correctly.

inputs:
    artifact-name:
        description: Name of the wheel artifact to download and install
        required: true

runs:
    using: composite
    steps:
        - name: Download wheel
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
          with:
              name: ${{ inputs.artifact-name }}
              path: dist

        - name: Install wheel
          shell: bash
          run: pip install dist/*.whl

        - name: Verify pybind11 extensions work
          uses: ./.github/actions/smoke-test-converter
